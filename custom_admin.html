<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin Panel</title>
    <link rel="stylesheet" href="/admin_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <!-- Authentication Screen -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <div class="logo-area">
                <i class='bx bxl-django'></i>
                <h2>Admin Login</h2>
            </div>
            <p class="subtitle">Enter your credentials to access the dashboard</p>
            <form id="login-form">
                <div class="input-group">
                    <i class='bx bx-user'></i>
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="dashboard-wrapper hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin<span>Pro</span></h2>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#"><i class='bx bx-grid-alt'></i> Projects</a></li>
                <li><a href="/" target="_blank"><i class='bx bx-globe'></i> View Site</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar"><i class='bx bx-user'></i></div>
                    <span id="user-display">Admin</span>
                </div>
                <button id="logout-btn" class="btn-icon"><i class='bx bx-log-out'></i></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>Projects Management</h1>
                <button id="add-project-btn" class="btn-primary"><i class='bx bx-plus'></i> New Project</button>
            </header>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Title</th>
                            <th>Technologies</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projects-tbody">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
                <div id="loader" class="loader">Loading...</div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit -->
    <div id="project-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Project</h3>
                <button class="close-btn" id="close-modal"><i class='bx bx-x'></i></button>
            </div>
            <form id="project-form">
                <input type="hidden" id="project-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="p-title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="p-desc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>URL (Optional)</label>
                    <input type="url" id="p-url">
                </div>
                <div class="form-group">
                    <label>Technologies (Comma separated)</label>
                    <input type="text" id="p-tech" required>
                </div>
                <div class="form-group">
                    <label>Project Image</label>
                    <input type="file" id="p-image" accept="image/*">
                    <div id="current-image-preview"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancel-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin_script.js"></script>
</body>
</html>
